{% extends 'user_app/base.html' %}
{% block title %}Crop Recommendation{% endblock %}

{% block content %}
<div class="card form-card shadow-sm mt-4">
  <div class="card-body">
    <h4 class="card-title mb-3">Crop Recommendation</h4>
    <form method="post">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Nitrogen</label>
          <input type="number" name="nitrogen" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Phosphorus</label>
          <input type="number" name="phosphorus" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Potassium</label>
          <input type="number" name="potassium" class="form-control" required>
        </div>

        <div class="col-md-4">
          <label class="form-label">Temperature</label>
          <input type="number" step="any" name="temperature" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Humidity</label>
          <input type="number" step="any" name="humidity" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">pH</label>
          <input type="number" step="any" name="ph" class="form-control" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Rainfall</label>
          <input type="number" step="any" name="rainfall" class="form-control" required>
        </div>

        <div class="col-12 text-center mt-3">
          <button type="submit" class="btn btn-success">Predict Crop</button>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
