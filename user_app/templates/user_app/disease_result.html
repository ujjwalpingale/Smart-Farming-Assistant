{% extends 'user_app/base.html' %}
{% block title %}Disease Result{% endblock %}

{% block content %}
<div class="card mt-4 shadow-sm">
  <div class="card-body text-center">
    <h4 class="card-title">Detected Disease</h4>
    <div class="alert alert-success mt-3" role="alert">
      <h5 class="mb-0">{{ disease }}</h5>
    </div>
    <h6 class="mt-3">Prevention</h6>
    <p class="text-muted">{{ prevention }}</p>
    <a href="/disease/" class="btn btn-outline-primary mt-3">Try Another</a>
  </div>
</div>
{% endblock %}
