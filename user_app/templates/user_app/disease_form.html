{% extends 'user_app/base.html' %}
{% block title %}Disease Detection{% endblock %}

{% block content %}
<div class="card form-card shadow-sm mt-4">
  <div class="card-body">
    <h4 class="card-title mb-3">Plant Disease Detection</h4>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Crop Name</label>
        <input type="text" name="crop_name" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Symptoms (optional)</label>
        <textarea name="symptoms" class="form-control" rows="3"></textarea>
      </div>

      <div class="mb-3">
        <label class="form-label">Upload Image</label>
        <input type="file" name="image" class="form-control" accept="image/*" required>
      </div>

      <div class="text-center mt-3">
        <button type="submit" class="btn btn-success">Detect Disease</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
